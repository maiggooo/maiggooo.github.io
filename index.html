<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werkzeuge &amp; Instrumente — Editorial Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:       #f4efe6;
    --paper-2:     #ebe4d6;
    --ink:         #1a1a1a;
    --ink-soft:    #3a3a38;
    --muted:       #6b6b66;
    --rule:        #1a1a1a;
    --rule-soft:   #d4cbb6;
    --accent:      #c8442a;
    --accent-soft: #f2d9d1;
    --ok:          #2f6b3a;
    --ok-soft:     #d6e5d3;
    --warn:        #a8541a;
    --shadow:      0 1px 0 var(--ink);
  }
  html[data-theme="dark"] {
    --paper:       #24241d;
    --paper-2:     #2e2e26;
    --ink:         #efe8d8;
    --ink-soft:    #cdc6b6;
    --muted:       #8a857a;
    --rule:        #efe8d8;
    --rule-soft:   #3a3a30;
    --accent:      #e8623f;
    --accent-soft: #3a1f18;
    --ok:          #9dc48b;
    --ok-soft:     #24301f;
    --warn:        #d68f4a;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { transition: background-color .35s ease, color .35s ease; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    transition: background-color .35s ease, color .35s ease;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--accent); color: #fff; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 28px 48px;
  }

  /* ————————————— MASTHEAD ————————————— */
  .masthead {
    border-top: 2px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    padding: 14px 0;
  }
  .mast-edition,
  .mast-tools {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: .16em;
    color: var(--muted);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .mast-tools { justify-content: flex-end; }
  .mast-edition span.dot { color: var(--ink); }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(22px, 3vw, 30px);
    letter-spacing: -.02em;
    line-height: 1;
    text-align: center;
    white-space: nowrap;
  }
  .brand .amp {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
    margin: 0 .12em;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: pointer;
    transition: background-color .2s ease, color .2s ease;
  }
  .icon-btn:hover { background: var(--ink); color: var(--paper); }
  .icon-btn:active { transform: translateY(1px); }

  /* ————————————— SUB-MASTHEAD DATE STRIP ————————————— */
  .datestrip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .datestrip .center { color: var(--ink); }

  /* ————————————— SECTION LABEL ————————————— */
  .section-label {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 44px 0 22px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: .18em;
    color: var(--ink);
  }
  .section-label .num { color: var(--accent); }
  .section-label .rule {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .section-label .meta {
    color: var(--muted);
  }

  /* ————————————— GALLERY GRID ————————————— */
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap: 0;
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
  }
  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    aspect-ratio: 1 / 1;
    min-height: 260px;
    padding: 22px 22px 20px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    color: inherit;
    background: var(--paper);
    transition: background-color .3s ease;
    overflow: hidden;
  }
  .tile::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    height: 2px;
    width: 0;
    background: var(--accent);
    transition: width .4s cubic-bezier(.7,0,.2,1);
  }
  .tile:hover::before { width: 100%; }
  .tile:hover { background: var(--paper-2); }

  .tile-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tile-head .no {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 28px;
    letter-spacing: -.03em;
    color: var(--accent);
    line-height: 1;
  }
  .tile-head .cat { color: var(--ink); }

  .tile-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(26px, 2.6vw, 34px);
    line-height: .95;
    letter-spacing: -.02em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .tile-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .tile-desc {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 0 0 22px;
  }

  .tile-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tile-foot .go {
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tile-foot .arrow {
    font-family: 'Fraunces', serif;
    font-style: italic;
    text-transform: none;
    font-size: 18px;
    color: var(--accent);
    transition: transform .3s ease;
  }
  .tile:hover .arrow { transform: translateX(6px); }

  /* Placeholder / vacant slot */
  .tile.vacant {
    background: repeating-linear-gradient(
      135deg,
      transparent 0 12px,
      var(--rule-soft) 12px 13px
    );
    pointer-events: none;
    color: var(--muted);
  }
  .tile.vacant::before { display: none; }
  .tile.vacant .tile-title {
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
  }
  .tile.vacant .tile-head .no { color: var(--muted); }
  .tile.vacant .vacant-stamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--muted);
    padding: 4px 8px;
    display: inline-block;
    align-self: flex-start;
  }

  /* ————————————— FOOTER ————————————— */
  .foot {
    border-top: 2px solid var(--rule);
    margin-top: 56px;
    padding: 18px 0 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: .16em;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 12px;
  }
  .foot .colophon em {
    font-family: 'Fraunces', serif;
    font-style: italic;
    text-transform: none;
    color: var(--accent);
    letter-spacing: 0;
    font-size: 13px;
  }

  /* ————————————— SIDE ADS (>1560px) ————————————— */
  .ads-side {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    z-index: 40;
    display: none;
    pointer-events: none;
  }
  .ads-side.left  { left: 20px; }
  .ads-side.right { right: 20px; }
  @media (min-width: 1560px) {
    .ads-side { display: block; }
  }
  body.ads-off .ads-side { display: none !important; }

  .ad-slot { position: relative; pointer-events: auto; }
  .ad-link { display: block; color: inherit; text-decoration: none; }
  .ad-link .ad { transition: transform .25s ease, box-shadow .25s ease, opacity .38s ease, background-color .3s ease; }
  .ad-link:hover .ad { transform: translateY(-2px); box-shadow: 3px 3px 0 var(--rule); }
  .ad {
    position: relative;
    border: 1px solid var(--rule);
    background: var(--paper);
    padding: 14px 14px 12px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .35s ease, transform .35s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 200px;
    font-family: 'Inter', sans-serif;
  }
  .ad.show { opacity: 1; transform: translateY(0); }

  .ad-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ad-eyebrow::before {
    content: "ANZEIGE";
    color: var(--accent);
    font-weight: 600;
  }
  .ad-eyebrow .sep { color: var(--rule-soft); }
  .ad-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    line-height: 1.05;
    color: var(--ink);
    letter-spacing: -.01em;
  }
  .ad-body {
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--ink-soft);
  }
  .ad-foot {
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ad-mark {
    color: var(--accent);
    font-family: 'Fraunces', serif;
    font-style: italic;
  }

  .ad--paypal .ad-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; line-height: 1.15; letter-spacing: -.01em; }
  .ad--paypal .ad-body  { font-size: 11.5px; line-height: 1.5; color: var(--ink-soft); }
  .ad--paypal .ad-hero  { font-family: 'Fraunces', serif; font-style: italic; font-size: 42px; color: var(--accent); line-height: 1; margin-bottom: 2px; }
  .ad--paypal .ad-cta {
    display: block;
    margin-top: 4px;
    padding: 11px 12px;
    background: var(--accent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    text-decoration: none;
    text-align: center;
    font-weight: 700;
    border: 1px solid var(--accent);
    transition: background .18s ease, border-color .18s ease, transform .12s ease, box-shadow .18s ease;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .ad--paypal .ad-cta:hover {
    background: var(--ink);
    border-color: var(--ink);
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--accent);
  }
  .ad--paypal .ad-cta:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .ad--kaffee { background: var(--paper-2); }
  .ad--kaffee .ad-title { font-style: italic; font-size: 28px; }
  .ad--kaffee .ad-hero  { font-size: 18px; letter-spacing: .35em; color: var(--muted); }

  .ad--stink .ad-title { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; line-height: 1.15; }
  .ad--stink .ad-hero  { font-size: 28px; letter-spacing: .1em; }
  .ad--stink .ad-body  { font-style: italic; font-family: 'Fraunces', serif; font-size: 13px; }

  .ad--pfalz { border-width: 2px; }
  .ad--pfalz .ad-title { font-family: 'Fraunces', serif; font-size: 17px; text-align: center; line-height: 1.15; }
  .ad--pfalz .ad-hero  { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .3em; color: var(--accent); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 5px 0; }
  .ad--pfalz .ad-body  { text-align: center; font-style: italic; font-family: 'Fraunces', serif; font-size: 12.5px; }

  .ad--kirche .ad-hero  { font-family: 'Fraunces', serif; font-size: 34px; color: var(--accent); text-align: center; line-height: 1; }
  .ad--kirche .ad-title { font-style: italic; font-size: 20px; text-align: center; }
  .ad--kirche .ad-body  { text-align: center; }

  .ad--reise .ad-title { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  .ad--reise .ad-hero  { font-size: 22px; color: var(--accent); }
  .ad--reise .ad-body  { border-top: 1px dashed var(--rule-soft); border-bottom: 1px dashed var(--rule-soft); padding: 6px 0; }

  .ad--schweig .ad-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 30px; text-align: center; margin: 8px 0 4px; }
  .ad--schweig .ad-hero  { text-align: center; font-size: 28px; letter-spacing: .5em; color: var(--muted); line-height: 1; }
  .ad--schweig .ad-body  { text-align: center; font-size: 10.5px; letter-spacing: .02em; }

  .ad--gastro .ad-hero  { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .4em; color: var(--paper); background: var(--accent); padding: 5px 10px; display: inline-block; align-self: flex-start; }
  .ad--gastro .ad-title { font-family: 'Fraunces', serif; font-size: 24px; font-style: italic; }

  .ad--minion { background: #f5d547; color: #1a1a1a; border-color: #1a1a1a; }
  .ad--minion .ad-eyebrow { color: #1a1a1a; }
  .ad--minion .ad-eyebrow::before { background: #1a1a1a; }
  .ad--minion .ad-hero  { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; letter-spacing: .22em; text-align: center; color: #1a1a1a; padding: 8px 0; border-top: 2px solid #1a1a1a; border-bottom: 2px solid #1a1a1a; }
  .ad--minion .ad-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 21px; text-align: center; color: #1a1a1a; line-height: 1.15; }
  .ad--minion .ad-body  { text-align: center; color: #1a1a1a; }
  .ad--minion .ad-foot  { color: #1a1a1a; border-top-color: rgba(26,26,26,.3); }
  .ad--minion .ad-mark  { color: #1a1a1a; font-style: italic; }

  /* ————————————— RESPONSIVE ————————————— */
  @media (max-width: 960px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .gallery { grid-template-columns: 1fr; }
    .tile { aspect-ratio: auto; min-height: 240px; }
    .mast-edition { display: none; }
    .masthead { grid-template-columns: 1fr auto; }
  }
  @media (max-width: 560px) {
    .wrap { padding: 20px 18px 60px; }
    .tile { padding: 20px 18px 18px; }
    .datestrip { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<!-- Optional marginalia — only visible on very wide screens -->
<!-- ————————— SIDE ADS ————————— -->
<aside class="ads-side left"  aria-hidden="true"><div class="ad-slot" id="adSlotLeft"></div></aside>
<aside class="ads-side right" aria-hidden="true"><div class="ad-slot" id="adSlotRight"></div></aside>

<div class="wrap">

  <!-- ————————— MASTHEAD ————————— -->
  <header class="masthead">
    <div class="mast-edition">
      <span>Vol. I</span>
      <span class="dot">·</span>
      <span>SS 2026</span>
      <span class="dot">·</span>
      <span>Nº 01</span>
    </div>
    <div class="brand">Werkzeuge <span class="amp">&amp;</span> Instrumente</div>
    <div class="mast-tools">
      <button class="icon-btn" id="adsBtn" aria-label="Werbung ein/aus" title="Werbung ein/aus">
        <span id="adsLabel">Ads</span>
      </button>
      <button class="icon-btn" id="themeBtn" aria-label="Theme umschalten">
        <span id="themeLabel">Dunkel</span>
      </button>
    </div>
  </header>

  <!-- ————————— DATE STRIP ————————— -->
  <div class="datestrip">
    <span id="todayLeft">Biebergemünd</span>
    <span class="center">Ein Index eigener Web-Werkzeuge</span>
    <span id="todayRight">—</span>
  </div>

  <!-- ————————— SECTION: KABINETT ————————— -->
  <div class="section-label">
    <span class="num">01</span>
    <span>—</span>
    <span>Kabinett</span>
    <span class="rule"></span>
    <span class="meta" id="tileCount">— Einträge</span>
  </div>

  <!-- ————————— GALLERY ————————— -->
  <section class="gallery" id="gallery" aria-label="Werkzeug-Galerie">
    <!-- injected by JS -->
  </section>

  <!-- ————————— FOOTER ————————— -->
  <footer class="foot">
    <div>Biebergemünd · Hessen</div>
    <div class="colophon">Gesetzt in <em>Fraunces</em> · Mono · Inter</div>
    <div>© <span id="year">2026</span> — Alle Rechte vorbehalten</div>
  </footer>

</div>

<script>
  /* ————————————————————————————————
     TOOL-REGISTER
     Trage hier deine Tools ein. Ein Eintrag erscheint
     nur dann in der Galerie, wenn `path` gesetzt ist.
     Leere Slots (path: "") werden als "vakant" gestempelt
     und dienen als visuelle Platzhalter.
     ———————————————————————————————— */
  const TOOLS = [
    {
      no: "I",
      category: "Tool",
      title: "MarketingQuiz <em>Nº 01</em>",
      desc: "Ein Quiz zum Fit werden in Marketing.",
      path: "MarketingTeacher.html"            // z.B. "mein-tool-1/"  ← Pfad im GitHub-Repo
    },
    {
      no: "II",
      category: "Tool",
      title: "Schere Stein Papier <em>Nº 02</em>",
      desc: "Beweise dich gegen den Computer.",
      path: "RPS.html"
    },
    {
      no: "III",
      category: "Tool",
      title: "ZeitZähler <em>Nº 03</em>",
      desc: "Wie lange musst du dich heute noch durchbeißen?.",
      path: "ZeitZaehler.html"
    },
    {
      no: "IV",
      category: "Tool",
      title: "Platzhalter <em>Nº 04</em>",
      desc: "Kurze Notiz zum Zweck des Werkzeugs.",
      path: ""
    },
    {
      no: "V",
      category: "Tool",
      title: "Platzhalter <em>Nº 05</em>",
      desc: "Kurze Notiz zum Zweck des Werkzeugs.",
      path: ""
    },
    {
      no: "VI",
      category: "Tool",
      title: "Platzhalter <em>Nº 06</em>",
      desc: "Kurze Notiz zum Zweck des Werkzeugs.",
      path: ""
    },
    {
      no: "VII",
      category: "Tool",
      title: "Platzhalter <em>Nº 07</em>",
      desc: "Kurze Notiz zum Zweck des Werkzeugs.",
      path: ""
    },
    {
      no: "VIII",
      category: "Tool",
      title: "Platzhalter <em>Nº 08</em>",
      desc: "Kurze Notiz zum Zweck des Werkzeugs.",
      path: "test2.html"
    },
    {
      no: "IX",
      category: "Tool",
      title: "Platzhalter <em>Nº 09</em>",
      desc: "Kurze Notiz zum Zweck des Werkzeugs.",
      path: "Tester.html"
    }
  ];

  /* ———— RENDER ———— */
  const gallery = document.getElementById('gallery');
  let liveCount = 0;

  TOOLS.forEach((t, i) => {
    const hasPath = t.path && t.path.trim().length > 0;
    if (hasPath) liveCount++;

    const el = document.createElement(hasPath ? 'a' : 'div');
    el.className = 'tile' + (hasPath ? '' : ' vacant');
    if (hasPath) {
      el.href = t.path;
      el.setAttribute('aria-label', t.title.replace(/<[^>]+>/g, ''));
    }

    el.innerHTML = `
      <div>
        <div class="tile-head">
          <span class="no">${t.no}</span>
          <span class="cat">${t.category || 'Tool'}</span>
        </div>
        <h2 class="tile-title">${t.title}</h2>
        <p class="tile-desc">${t.desc || ''}</p>
        ${!hasPath ? '<span class="vacant-stamp">— vakant —</span>' : ''}
      </div>
      <div class="tile-foot">
        ${hasPath
          ? `<span class="go">Öffnen <span class="arrow">→</span></span><span>${(t.path || '').replace(/\/$/, '')}</span>`
          : `<span>Kein Pfad hinterlegt</span><span>—</span>`
        }
      </div>
    `;
    gallery.appendChild(el);
  });

  /* ———— METRICS ———— */
  document.getElementById('tileCount').textContent =
    String(liveCount).padStart(2, '0') + ' von ' + String(TOOLS.length).padStart(2, '0') + ' Einträgen';

  /* ———— DATE ———— */
  const now = new Date();
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dateStr = `${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('todayRight').textContent = dateStr;
  document.getElementById('year').textContent = now.getFullYear();

  /* ———— THEME TOGGLE ———— */
  const themeBtn = document.getElementById('themeBtn');
  const themeLabel = document.getElementById('themeLabel');
  const root = document.documentElement;

  function applyTheme(t) {
    if (t === 'dark') {
      root.setAttribute('data-theme', 'dark');
      themeLabel.textContent = 'Hell';
    } else {
      root.removeAttribute('data-theme');
      themeLabel.textContent = 'Dunkel';
    }
  }

  const stored = localStorage.getItem('werkzeuge-theme');
  applyTheme(stored === 'dark' ? 'dark' : 'light');

  themeBtn.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('werkzeuge-theme', next);
  });

  /* ————————————————————————————————
     SIDE ADS — rotating pseudo-classifieds
     ———————————————————————————————— */
  const PAYPAL_AD = {
    cls: "paypal",
    eyebrow: "UNTERSTÜTZUNG",
    hero: "☕",
    title: "Ein Kaffee für Maiko?",
    body: "Wenn dir die App hilft — kleine Geste, große Freude.",
    cta: { label: "paypal.me/maiggooo →", url: "https://paypal.me/maiggooo" },
    foot: "PAYPAL · DANKE",
    mark: "♡"
  };

  const ADS = [
    { cls:"kaffee", eyebrow:"CAMPUS", hero:"· · ·", title:"Linas Kaffee",
      body:"Der einzige Grund, morgens die Vorlesung nicht zu schwänzen. Bohnen aus Überzeugung.",
      foot:"Mo–Fr · ab 07:30", mark:"L" },
    { cls:"stink", eyebrow:"DIENSTLEISTUNG", hero:"☁ ☁ ☁", title:"Pauls Stinke­service",
      body:"„Wir liefern Duft. Meistens den falschen.",
      foot:"Auf Anfrage", mark:"P" },
    { cls:"pfalz", eyebrow:"SEIT '74", hero:"MARKT · FASS · FLASCHE", title:"Getränke Pfalzgraf",
      body:"Regional, ehrlich, kalt. Für jede Runde die richtige Kiste.",
      foot:"Landau · Pfalz", mark:"✦", link:"http://www.getraenke-pfalzgraf.de/" },
    { cls:"kirche", eyebrow:"SONNTAGS · 10 UHR", hero:"✝", title:"Kians Gottesdienst",
      body:"Predigt, Musik, Kaffee danach. Kommt zahlreich.",
      foot:"Eintritt frei", mark:"K" },
    { cls:"reise", eyebrow:"REISEBÜRO", hero:"✈", title:"Konsis Reiseplaner",
      body:"Von Biebergemünd in die Welt — und rechtzeitig zurück zur Klausur.",
      foot:"Buchung · 24/7", mark:"→" },
    { cls:"schweig", eyebrow:"PREMIUM STILLE", hero:". . .", title:"Katalinas Schweigen.",
      body:"Der Schweigeservice. Wir sagen nichts. Garantiert.",
      foot:"Diskretion inklusive", mark:"—" },
    { cls:"gastro", eyebrow:"CATERING", hero:"G · I · G", title:"Mats Gastro",
      body:"Für Events, Meetings und den echten Hunger nach der Vorlesung.",
      foot:"Anfrage per DM", mark:"M" },
    { cls:"minion", eyebrow:"LIVE-PERFORMANCE", hero:"BELLO!", title:"Selinas Minion Impressionen",
      body:"Banana. Papoy. Tulaliloo. Selina macht sie alle — auf Wunsch mit Latzhose.",
      foot:"Buchbar für Events", mark:"S" }
  ];

  function renderAd(slotEl, ad) {
    const ctaHTML = ad.cta
      ? `<a class="ad-cta" href="${ad.cta.url}" target="_blank" rel="noopener">${ad.cta.label}</a>`
      : ``;
    const inner = `
      <div class="ad ad--${ad.cls}">
        <div class="ad-eyebrow"><span class="sep">·</span><span>${ad.eyebrow}</span></div>
        ${ad.hero ? `<div class="ad-hero">${ad.hero}</div>` : ``}
        <div class="ad-title">${ad.title}</div>
        <div class="ad-body">${ad.body}</div>
        ${ctaHTML}
        <div class="ad-foot"><span>${ad.foot}</span><span class="ad-mark">${ad.mark}</span></div>
      </div>`;
    slotEl.innerHTML = ad.link
      ? `<a class="ad-link" href="${ad.link}" target="_blank" rel="noopener">${inner}</a>`
      : inner;
    requestAnimationFrame(() => {
      const el = slotEl.querySelector('.ad');
      if (el) el.classList.add('show');
    });
  }

  function swapAd(slotEl, ad) {
    const current = slotEl.querySelector('.ad');
    if (!current) { renderAd(slotEl, ad); return; }
    current.classList.remove('show');
    setTimeout(() => renderAd(slotEl, ad), 380);
  }

  let adTick = 0;
  function cycleAds() {
    const rightSlot = document.getElementById('adSlotRight');
    if (!rightSlot) return;
    adTick = (adTick + 1) % ADS.length;
    swapAd(rightSlot, ADS[adTick]);
  }
  function initAds() {
    const leftSlot  = document.getElementById('adSlotLeft');
    const rightSlot = document.getElementById('adSlotRight');
    if (!leftSlot || !rightSlot) return;
    renderAd(leftSlot,  PAYPAL_AD);
    renderAd(rightSlot, ADS[0]);
    adTick = 0;
    setInterval(cycleAds, 10000);
  }

  /* Ads on/off toggle (persisted) */
  function setAds(on) {
    document.body.classList.toggle('ads-off', !on);
    localStorage.setItem('werk-ads', on ? 'on' : 'off');
    const label = document.getElementById('adsLabel');
    if (label) label.textContent = on ? 'Ads' : 'Ads · aus';
  }
  (function initAdsToggle(){
    const stored = localStorage.getItem('werk-ads');
    setAds(stored !== 'off');
    const btn = document.getElementById('adsBtn');
    if (btn) btn.addEventListener('click', () => {
      const on = !document.body.classList.contains('ads-off');
      setAds(!on);
    });
  })();

  initAds();
</script>

</body>
</html>
