
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schere & Stein & Papier — Vol. I · Nº 03</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400;1,9..144,600;1,9..144,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper:       #f4efe6;
  --paper-2:     #ebe4d6;
  --ink:         #1a1a1a;
  --ink-soft:    #3a3a38;
  --muted:       #6b6b66;
  --rule:        #1a1a1a;
  --rule-soft:   #d4cbb6;
  --accent:      #c8442a;
  --accent-soft: #f2d9d1;
  --ok:          #2f6b3a;
  --ok-soft:     #d6e5d3;
  --warn:        #a8541a;
  --shadow:      0 1px 0 var(--ink);
}
html[data-theme="dark"] {
  --paper:       #24241d;
  --paper-2:     #2e2e26;
  --ink:         #efe8d8;
  --ink-soft:    #cdc6b6;
  --muted:       #8a857a;
  --rule:        #efe8d8;
  --rule-soft:   #3a3a30;
  --accent:      #e8623f;
  --accent-soft: #3a1f18;
  --ok:          #9dc48b;
  --ok-soft:     #24301f;
  --warn:        #d68f4a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { transition: background-color .4s ease, color .4s ease; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  background: var(--paper);
  color: var(--ink);
  transition: background-color .4s ease, color .4s ease;
  min-height: 100vh;
}
.wrap { max-width: 1180px; margin: 0 auto; padding: 24px 28px 48px; }

/* MASTHEAD */
.masthead {
  border-top: 2px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 14px 0;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
}
.mast-edition, .mast-tools {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--muted);
}
.mast-tools { text-align: right; display: flex; justify-content: flex-end; gap: 14px; }
.mast-tools button {
  background: none; border: none; cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .18em;
  color: var(--muted); padding: 0;
}
.mast-tools button:hover { color: var(--ink); }
.mast-brand {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: clamp(22px, 3vw, 30px);
  letter-spacing: -.02em;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}
.mast-brand .amp {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
  padding: 0 4px;
}
.arrow { font-family: 'Fraunces', serif; font-style: italic; text-transform: none; }

/* Small back-link row */
.subbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.subbar a, .subbar .kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--muted);
  text-decoration: none;
}
.subbar a:hover { color: var(--accent); }

/* MINI HERO — nur eine Zeile */
.mini-hero {
  padding: 46px 0 26px;
  text-align: center;
}
.mini-hero h1 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-style: italic;
  font-size: clamp(38px, 6vw, 64px);
  letter-spacing: -.03em;
  line-height: .95;
  color: var(--ink);
}
.mini-hero h1 em { color: var(--accent); font-style: italic; }

/* ARENA */
.arena {
  padding: 30px 0 40px;
  border-top: 1px solid var(--rule-soft);
  border-bottom: 1px solid var(--rule-soft);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
  min-height: 280px;
}
.fighter { text-align: center; }
.fighter .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .22em;
  color: var(--muted);
  margin-bottom: 4px;
}
.fighter .score {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 34px;
  line-height: 1;
  color: var(--accent);
  letter-spacing: -.03em;
  margin-bottom: 14px;
  font-variant-numeric: tabular-nums;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.fighter .score.bump { transform: scale(1.25); }
.versus-wrap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.versus-wrap .draw-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .22em;
  color: var(--muted);
  margin-top: 6px;
}
.versus-wrap .draw-num {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 18px;
  line-height: 1;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.versus-wrap .draw-num.bump { transform: scale(1.25); }
.glyph {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(96px, 16vw, 180px);
  line-height: 1;
  color: var(--ink);
  display: inline-block;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .2s ease;
}
.glyph.idle { opacity: .18; }
.glyph.reveal { animation: reveal .55s cubic-bezier(.34,1.56,.64,1); }
.glyph.spin { animation: spin .5s linear; }
@keyframes reveal {
  0% { transform: scale(.4) rotate(-12deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(4deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes spin {
  0% { transform: rotate(0); }
  100% { transform: rotate(360deg); }
}
.versus {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: clamp(28px, 4vw, 42px);
  color: var(--accent);
  letter-spacing: -.02em;
}

/* VERDICT */
.verdict {
  margin-top: 28px;
  padding: 18px 20px;
  background: var(--paper-2);
  border-left: 3px solid var(--rule-soft);
  transition: border-color .3s ease;
  min-height: 76px;
}
.verdict .v-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--muted);
  margin-bottom: 6px;
  transition: color .3s ease;
}
.verdict .v-text {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  line-height: 1.25;
  color: var(--ink);
}
.verdict.win { border-left-color: var(--ok); }
.verdict.win .v-label { color: var(--ok); }
.verdict.lose { border-left-color: var(--accent); }
.verdict.lose .v-label { color: var(--accent); }
.verdict.draw { border-left-color: var(--warn); }
.verdict.draw .v-label { color: var(--warn); }

/* CHOICES */
.choices {
  margin-top: 34px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.choice {
  position: relative;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  background: none;
  border: none;
  border-right: 1px solid var(--rule-soft);
  font: inherit;
  color: inherit;
  transition: background-color .2s ease;
}
.choice:last-child { border-right: none; }
.choice::before {
  content: "";
  position: absolute;
  left: 0; bottom: -1px;
  height: 2px; width: 0;
  background: var(--accent);
  transition: width .35s cubic-bezier(.7,0,.2,1);
}
.choice:hover::before, .choice:focus-visible::before { width: 100%; }
.choice:focus-visible { outline: none; background: var(--paper-2); }
.choice .num {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 26px;
  color: var(--accent);
  letter-spacing: -.03em;
  margin-bottom: 6px;
}
.choice .cg {
  font-family: 'Fraunces', serif;
  font-size: 44px;
  line-height: 1;
  margin-bottom: 10px;
  color: var(--ink);
}
.choice .cn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--muted);
}

/* CTA-ROW */
.cta-row {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .14em;
  padding: 13px 22px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: filter .2s ease, transform .05s ease;
}
.btn:hover { filter: brightness(.92); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* FOOTER */
.footer {
  margin-top: 60px;
  border-top: 2px solid var(--rule);
  padding: 18px 0;
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--muted);
}

/* RESPONSIVE */
@media (max-width: 720px) {
  .mini-hero { padding: 32px 0 18px; }
  .arena { grid-template-columns: 1fr; gap: 8px; min-height: 0; padding: 24px 0; }
  .versus { padding: 4px 0; }
  .glyph { font-size: clamp(80px, 22vw, 140px); }
  .choices { grid-template-columns: repeat(3, 1fr); }
  .choice { padding: 20px 8px; }
  .choice .cg { font-size: 34px; }
  .choice .num { font-size: 20px; }
}
@media (max-width: 560px) {
  .wrap { padding: 20px 18px 60px; }
  .mast-edition { display: none; }
  .masthead { grid-template-columns: auto 1fr; }
  .mast-tools { grid-column: 2; }
  .mast-brand { grid-column: 1 / -1; grid-row: 2; margin-top: 8px; }
  .cta-row .btn { flex: 1 1 100%; text-align: center; }
}

/* ==================== SIDE ADS ==================== */
.ads-side {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 200px;
  z-index: 40;
  display: none;
  pointer-events: none;
}
.ads-side.left  { left: 20px; }
.ads-side.right { right: 20px; }
@media (min-width: 1200px) {
  .ads-side { display: block; }
}
body.ads-off .ads-side { display: none !important; }

.ad-slot { position: relative; pointer-events: auto; }
.ad-link { display: block; color: inherit; text-decoration: none; }
.ad-link .ad { transition: transform .25s ease, box-shadow .25s ease, opacity .38s ease, background-color .3s ease; }
.ad-link:hover .ad { transform: translateY(-2px); box-shadow: 3px 3px 0 var(--rule); }
.ad {
  position: relative;
  border: 1px solid var(--rule);
  background: var(--paper);
  padding: 14px 14px 12px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .35s ease, transform .35s ease;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 200px;
  font-family: 'Inter', sans-serif;
}
.ad.show { opacity: 1; transform: translateY(0); }

.ad-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.ad-eyebrow::before {
  content: "ANZEIGE";
  color: var(--accent);
  font-weight: 600;
}
.ad-eyebrow .sep { color: var(--rule-soft); }
.ad-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  line-height: 1.05;
  color: var(--ink);
  letter-spacing: -.01em;
}
.ad-body {
  font-size: 11.5px;
  line-height: 1.5;
  color: var(--ink-soft);
}
.ad-foot {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--rule-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ad-mark {
  color: var(--accent);
  font-family: 'Fraunces', serif;
  font-style: italic;
}

/* ---- Per-ad variants ---- */
.ad--paypal .ad-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; line-height: 1.15; letter-spacing: -.01em; }
.ad--paypal .ad-body  { font-size: 11.5px; line-height: 1.5; color: var(--ink-soft); }
.ad--paypal .ad-hero  { font-family: 'Fraunces', serif; font-style: italic; font-size: 42px; color: var(--accent); line-height: 1; margin-bottom: 2px; }
.ad--paypal .ad-cta {
  display: block;
  margin-top: 4px;
  padding: 11px 12px;
  background: var(--accent);
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  text-decoration: none;
  text-align: center;
  font-weight: 700;
  border: 1px solid var(--accent);
  transition: background .18s ease, border-color .18s ease, transform .12s ease, box-shadow .18s ease;
  box-shadow: 3px 3px 0 var(--ink);
}
.ad--paypal .ad-cta:hover {
  background: var(--ink);
  border-color: var(--ink);
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0 var(--accent);
}
.ad--paypal .ad-cta:active {
  transform: translate(1px, 1px);
  box-shadow: 1px 1px 0 var(--ink);
}

.ad--kaffee { background: var(--paper-2); }
.ad--kaffee .ad-title { font-style: italic; font-size: 28px; }
.ad--kaffee .ad-hero  { font-size: 18px; letter-spacing: .35em; color: var(--muted); }

.ad--stink .ad-title { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; line-height: 1.15; }
.ad--stink .ad-hero  { font-size: 28px; letter-spacing: .1em; }
.ad--stink .ad-body  { font-style: italic; font-family: 'Fraunces', serif; font-size: 13px; }

.ad--pfalz { border-width: 2px; }
.ad--pfalz .ad-title { font-family: 'Fraunces', serif; font-size: 17px; text-align: center; line-height: 1.15; }
.ad--pfalz .ad-hero  { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .3em; color: var(--accent); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 5px 0; }
.ad--pfalz .ad-body  { text-align: center; font-style: italic; font-family: 'Fraunces', serif; font-size: 12.5px; }

.ad--kirche .ad-hero  { font-family: 'Fraunces', serif; font-size: 34px; color: var(--accent); text-align: center; line-height: 1; }
.ad--kirche .ad-title { font-style: italic; font-size: 20px; text-align: center; }
.ad--kirche .ad-body  { text-align: center; }

.ad--reise .ad-title { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
.ad--reise .ad-hero  { font-size: 22px; color: var(--accent); }
.ad--reise .ad-body  { border-top: 1px dashed var(--rule-soft); border-bottom: 1px dashed var(--rule-soft); padding: 6px 0; }

.ad--schweig .ad-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 30px; text-align: center; margin: 8px 0 4px; }
.ad--schweig .ad-hero  { text-align: center; font-size: 28px; letter-spacing: .5em; color: var(--muted); line-height: 1; }
.ad--schweig .ad-body  { text-align: center; font-size: 10.5px; letter-spacing: .02em; }

.ad--gastro .ad-hero  { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .4em; color: var(--paper); background: var(--accent); padding: 5px 10px; display: inline-block; align-self: flex-start; }
.ad--gastro .ad-title { font-family: 'Fraunces', serif; font-size: 24px; font-style: italic; }

.ad--minion { background: #f5d547; color: #1a1a1a; border-color: #1a1a1a; }
.ad--minion .ad-eyebrow { color: #1a1a1a; }
.ad--minion .ad-eyebrow::before { background: #1a1a1a; }
.ad--minion .ad-hero  { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; letter-spacing: .22em; text-align: center; color: #1a1a1a; padding: 8px 0; border-top: 2px solid #1a1a1a; border-bottom: 2px solid #1a1a1a; }
.ad--minion .ad-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 21px; text-align: center; color: #1a1a1a; line-height: 1.15; }
.ad--minion .ad-body  { text-align: center; color: #1a1a1a; }
.ad--minion .ad-foot  { color: #1a1a1a; border-top-color: rgba(26,26,26,.3); }
.ad--minion .ad-mark  { color: #1a1a1a; font-style: italic; }

</style>
</head>
<body>
<div class="wrap">

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="mast-edition">Vol. I · SS 2026 · Nº 03</div>
    <div class="mast-brand">Schere <span class="amp">&amp;</span> Stein <span class="amp">&amp;</span> Papier</div>
    <div class="mast-tools">
      <button id="adsToggle" aria-label="Werbung ein/aus">Ads</button>
      <button id="themeToggle" title="Theme wechseln">Theme</button>
    </div>
  </header>

  <!-- SUBBAR mit Back-Link -->
  <div class="subbar">
    <a href="index.html" title="Zurück zur Startseite"><span class="arrow">←</span>&nbsp;&nbsp;Zurück zur Startseite</a>
    <span class="kicker">Ein Spiel · Drei Gesten</span>
  </div>

  <!-- MINI HERO -->
  <section class="mini-hero">
    <h1>Wählen Sie <em>eine</em> Geste.</h1>
  </section>

  <!-- ARENA -->
  <section class="arena">
    <div class="fighter">
      <div class="label">Sie</div>
      <div id="playerScore" class="score">0</div>
      <div id="playerGlyph" class="glyph idle">✋</div>
    </div>
    <div class="versus-wrap">
      <div class="versus">vs.</div>
      <div class="draw-label">Patt</div>
      <div id="drawScore" class="draw-num">0</div>
    </div>
    <div class="fighter">
      <div class="label">Automat</div>
      <div id="cpuScore" class="score">0</div>
      <div id="cpuGlyph" class="glyph idle">✋</div>
    </div>
  </section>

  <!-- VERDICT -->
  <div id="verdict" class="verdict">
    <div class="v-label">Ausgang</div>
    <div class="v-text" id="verdictText">Treffen Sie Ihre Wahl.</div>
  </div>

  <!-- CHOICES -->
  <div class="choices" role="group" aria-label="Ihre Wahl">
    <button class="choice" data-move="scissors" aria-label="Schere">
      <div class="num">i.</div>
      <div class="cg">✌</div>
      <div class="cn">Schere</div>
    </button>
    <button class="choice" data-move="rock" aria-label="Stein">
      <div class="num">ii.</div>
      <div class="cg">✊</div>
      <div class="cn">Stein</div>
    </button>
    <button class="choice" data-move="paper" aria-label="Papier">
      <div class="num">iii.</div>
      <div class="cg">✋</div>
      <div class="cn">Papier</div>
    </button>
  </div>

  <!-- CTA -->
  <div class="cta-row">
    <button id="resetBtn" class="btn">Neu beginnen&nbsp;&nbsp;<span class="arrow">↺</span></button>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div>Biebergemünd · Hessen</div>
    <div>© MMXXVI</div>
  </footer>

</div>

<!-- ==================== SIDE ADS ==================== -->
<aside class="ads-side left"  aria-hidden="true"><div class="ad-slot" id="adSlotLeft"></div></aside>
<aside class="ads-side right" aria-hidden="true"><div class="ad-slot" id="adSlotRight"></div></aside>

<script>
(function(){
  // THEME
  const root = document.documentElement;
  const saved = localStorage.getItem('ssp-theme');
  if (saved) root.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = root.getAttribute('data-theme') === 'dark' ? '' : 'dark';
    if (cur) root.setAttribute('data-theme', cur); else root.removeAttribute('data-theme');
    localStorage.setItem('ssp-theme', cur);
  });

  // GAME
  const GLYPH = { scissors: '✌', rock: '✊', paper: '✋' };
  const NAME  = { scissors: 'Schere', rock: 'Stein', paper: 'Papier' };
  const BEATS = { scissors: 'paper', rock: 'scissors', paper: 'rock' };

  const playerG = document.getElementById('playerGlyph');
  const cpuG    = document.getElementById('cpuGlyph');
  const verdict = document.getElementById('verdict');
  const vText   = document.getElementById('verdictText');
  const vLabel  = verdict.querySelector('.v-label');

  let busy = false;
  const score = { player: 0, cpu: 0, draw: 0 };
  const pScoreEl = document.getElementById('playerScore');
  const cScoreEl = document.getElementById('cpuScore');
  const dScoreEl = document.getElementById('drawScore');
  function bump(el, key) {
    score[key]++;
    el.textContent = score[key];
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function reveal(el, glyph, cls) {
    el.textContent = glyph;
    el.classList.remove('idle', 'reveal', 'spin');
    void el.offsetWidth;
    el.classList.add(cls);
  }

  function play(move) {
    if (busy) return;
    busy = true;

    // Player reveal instant
    reveal(playerG, GLYPH[move], 'reveal');

    // CPU suspense spin
    cpuG.classList.remove('idle');
    let ticks = 0;
    const glyphs = Object.values(GLYPH);
    const spin = setInterval(() => {
      cpuG.textContent = glyphs[ticks % 3];
      ticks++;
    }, 90);

    setTimeout(() => {
      clearInterval(spin);
      const cpuMove = ['scissors','rock','paper'][Math.floor(Math.random()*3)];
      reveal(cpuG, GLYPH[cpuMove], 'reveal');

      // resolve
      verdict.classList.remove('win','lose','draw');
      if (move === cpuMove) {
        verdict.classList.add('draw');
        vLabel.textContent = 'Patt';
        vText.innerHTML = '<em style="font-style:italic;color:var(--warn)">Unentschieden.</em> Beide wählten ' + NAME[move] + '.';
        bump(dScoreEl, 'draw');
      } else if (BEATS[move] === cpuMove) {
        verdict.classList.add('win');
        vLabel.textContent = 'Sieg';
        vText.innerHTML = NAME[move] + ' schlägt ' + NAME[cpuMove] + '. <em style="font-style:italic;color:var(--ok)">Sie gewinnen.</em>';
        bump(pScoreEl, 'player');
      } else {
        verdict.classList.add('lose');
        vLabel.textContent = 'Niederlage';
        vText.innerHTML = NAME[cpuMove] + ' schlägt ' + NAME[move] + '. <em style="font-style:italic;color:var(--accent)">Der Automat gewinnt.</em>';
        bump(cScoreEl, 'cpu');
      }
      busy = false;
    }, 720);
  }

  document.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => play(btn.dataset.move));
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    playerG.textContent = '✋'; cpuG.textContent = '✋';
    playerG.classList.remove('reveal','spin'); cpuG.classList.remove('reveal','spin');
    playerG.classList.add('idle'); cpuG.classList.add('idle');
    verdict.classList.remove('win','lose','draw');
    vLabel.textContent = 'Ausgang';
    vText.textContent = 'Treffen Sie Ihre Wahl.';
    score.player = 0; score.cpu = 0; score.draw = 0;
    pScoreEl.textContent = '0'; cScoreEl.textContent = '0'; dScoreEl.textContent = '0';
  });

  // Keyboard: 1/2/3 or s/t/p
  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === '1' || k === 's') play('scissors');
    else if (k === '2' || k === 't') play('rock');
    else if (k === '3' || k === 'p') play('paper');
    else if (k === 'r') document.getElementById('resetBtn').click();
  });

  // ==================== ADS ====================
  function setAds(on) {
    document.body.classList.toggle('ads-off', !on);
    localStorage.setItem('ssp-ads', on ? 'on' : 'off');
    const btn = document.getElementById('adsToggle');
    if (btn) btn.textContent = on ? 'Ads' : 'Ads·off';
  }
  (function initAdsToggle(){
    const stored = localStorage.getItem('ssp-ads');
    setAds(stored !== 'off');
  })();
  const adsToggleBtn = document.getElementById('adsToggle');
  if (adsToggleBtn) {
    adsToggleBtn.addEventListener('click', () => {
      const on = !document.body.classList.contains('ads-off');
      setAds(!on);
    });
  }

  const PAYPAL_AD = {
    cls: "paypal",
    eyebrow: "UNTERSTÜTZUNG",
    hero: "☕",
    title: "Ein Kaffee für Maiko?",
    body: "Wenn dir die App hilft — kleine Geste, große Freude.",
    cta: { label: "paypal.me/maiggooo →", url: "https://paypal.me/maiggooo" },
    foot: "PAYPAL · DANKE",
    mark: "♡"
  };

  const ADS = [
    { cls: "kaffee",  eyebrow: "CAMPUS",           hero: "· · ·",              title: "Linas Kaffee",                    body: "Der einzige Grund, morgens die Vorlesung nicht zu schwänzen. Bohnen aus Überzeugung.", foot: "Mo–Fr · ab 07:30", mark: "L" },
    { cls: "stink",   eyebrow: "DIENSTLEISTUNG",   hero: "☁ ☁ ☁",              title: "Pauls Stinke\u00adservice",       body: "„Wir liefern Duft. Meistens den falschen.",                                            foot: "Auf Anfrage",       mark: "P" },
    { cls: "pfalz",   eyebrow: "SEIT '74",         hero: "MARKT · FASS · FLASCHE", title: "Getränke Pfalzgraf",           body: "Regional, ehrlich, kalt. Für jede Runde die richtige Kiste.",                          foot: "Landau · Pfalz",    mark: "✦", link: "http://www.getraenke-pfalzgraf.de/" },
    { cls: "kirche",  eyebrow: "SONNTAGS · 10 UHR",hero: "✝",                  title: "Kians Gottesdienst",             body: "Predigt, Musik, Kaffee danach. Kommt zahlreich.",                                       foot: "Eintritt frei",     mark: "K" },
    { cls: "reise",   eyebrow: "REISEBÜRO",        hero: "✈",                  title: "Konsis Reiseplaner",             body: "Von Biebergemünd in die Welt — und rechtzeitig zurück zur Klausur.",                    foot: "Buchung · 24/7",    mark: "→" },
    { cls: "schweig", eyebrow: "PREMIUM STILLE",   hero: ". . .",              title: "Katalinas Schweigen.",           body: "Der Schweigeservice. Wir sagen nichts. Garantiert.",                                    foot: "Diskretion inklusive", mark: "—" },
    { cls: "gastro",  eyebrow: "CATERING",         hero: "G · I · G",          title: "Mats Gastro",                    body: "Für Events, Meetings und den echten Hunger nach der Vorlesung.",                        foot: "Anfrage per DM",    mark: "M" },
    { cls: "minion",  eyebrow: "LIVE-PERFORMANCE", hero: "BELLO!",             title: "Selinas Minion Impressionen",    body: "Banana. Papoy. Tulaliloo. Selina macht sie alle — auf Wunsch mit Latzhose.",           foot: "Buchbar für Events",mark: "S" }
  ];

  function renderAd(slotEl, ad) {
    const ctaHTML = ad.cta
      ? `<a class="ad-cta" href="${ad.cta.url}" target="_blank" rel="noopener">${ad.cta.label}</a>`
      : ``;
    const inner = `
      <div class="ad ad--${ad.cls}">
        <div class="ad-eyebrow"><span class="sep">·</span><span>${ad.eyebrow}</span></div>
        ${ad.hero ? `<div class="ad-hero">${ad.hero}</div>` : ``}
        <div class="ad-title">${ad.title}</div>
        <div class="ad-body">${ad.body}</div>
        ${ctaHTML}
        <div class="ad-foot"><span>${ad.foot}</span><span class="ad-mark">${ad.mark}</span></div>
      </div>`;
    slotEl.innerHTML = ad.link
      ? `<a class="ad-link" href="${ad.link}" target="_blank" rel="noopener">${inner}</a>`
      : inner;
    requestAnimationFrame(() => {
      const el = slotEl.querySelector('.ad');
      if (el) el.classList.add('show');
    });
  }
  function swapAd(slotEl, ad) {
    const current = slotEl.querySelector('.ad');
    if (!current) { renderAd(slotEl, ad); return; }
    current.classList.remove('show');
    setTimeout(() => renderAd(slotEl, ad), 380);
  }
  let adTick = 0;
  function cycleAds() {
    const rightSlot = document.getElementById('adSlotRight');
    if (!rightSlot) return;
    adTick = (adTick + 1) % ADS.length;
    swapAd(rightSlot, ADS[adTick]);
  }
  (function initAds(){
    const leftSlot  = document.getElementById('adSlotLeft');
    const rightSlot = document.getElementById('adSlotRight');
    if (!leftSlot || !rightSlot) return;
    renderAd(leftSlot,  PAYPAL_AD);
    renderAd(rightSlot, ADS[0]);
    adTick = 0;
    setInterval(cycleAds, 10000);
  })();

})();
</script>

</body>
</html>
