<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Werkzeuge &amp; Instrumente — Editorial Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:       #f4efe6;
    --paper-2:     #ebe4d6;
    --ink:         #1a1a1a;
    --ink-soft:    #3a3a38;
    --muted:       #6b6b66;
    --rule:        #1a1a1a;
    --rule-soft:   #d4cbb6;
    --accent:      #c8442a;
    --accent-soft: #f2d9d1;
    --ok:          #2f6b3a;
    --ok-soft:     #d6e5d3;
    --warn:        #a8541a;
    --shadow:      0 1px 0 var(--ink);
  }
  html[data-theme="dark"] {
    --paper:       #24241d;
    --paper-2:     #2e2e26;
    --ink:         #efe8d8;
    --ink-soft:    #cdc6b6;
    --muted:       #8a857a;
    --rule:        #efe8d8;
    --rule-soft:   #3a3a30;
    --accent:      #e8623f;
    --accent-soft: #3a1f18;
    --ok:          #9dc48b;
    --ok-soft:     #24301f;
    --warn:        #d68f4a;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { transition: background-color .35s ease, color .35s ease; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    transition: background-color .35s ease, color .35s ease;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--accent); color: #fff; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 28px 48px;
  }

  /* ————————————— MASTHEAD ————————————— */
  .masthead {
    border-top: 2px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    padding: 14px 0;
  }
  .mast-edition,
  .mast-tools {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: .16em;
    color: var(--muted);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .mast-tools { justify-content: flex-end; }
  .mast-edition span.dot { color: var(--ink); }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: clamp(22px, 3vw, 30px);
    letter-spacing: -.02em;
    line-height: 1;
    text-align: center;
    white-space: nowrap;
  }
  .brand .amp {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
    margin: 0 .12em;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 6px 10px;
    cursor: pointer;
    transition: background-color .2s ease, color .2s ease;
  }
  .icon-btn:hover { background: var(--ink); color: var(--paper); }
  .icon-btn:active { transform: translateY(1px); }

  /* ————————————— WEATHER WIDGET ————————————— */
  .weather-wrap { position: relative; }
  .weather {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 1px solid transparent;
    padding: 5px 9px;
    cursor: pointer;
    transition: color .2s ease, border-color .2s ease, background-color .2s ease;
  }
  .weather:hover,
  .weather.open {
    color: var(--ink);
    border-color: var(--rule);
  }
  .weather.loading { opacity: .5; cursor: default; }
  .weather-icon {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-style: normal;
    color: var(--accent);
    line-height: 1;
    letter-spacing: 0;
    text-transform: none;
    display: inline-block;
    transform: translateY(-1px);
  }
  .weather-temp {
    font-weight: 700;
    color: var(--ink);
    letter-spacing: .06em;
  }
  .weather-sep { color: var(--rule-soft); }
  .weather-desc {
    color: var(--muted);
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-size: 12.5px;
    letter-spacing: 0;
    text-transform: none;
  }
  .weather-caret {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    color: var(--muted);
    text-transform: none;
    letter-spacing: 0;
    transition: transform .25s ease;
  }
  .weather.open .weather-caret { transform: rotate(180deg); }

  .forecast {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    z-index: 60;
    min-width: 340px;
    background: var(--paper);
    border: 1px solid var(--rule);
    box-shadow: 4px 4px 0 var(--rule);
    padding: 16px 18px 14px;
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    transition: opacity .22s ease, transform .22s ease;
  }
  .forecast.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .forecast-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .forecast-head .loc {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink);
  }
  .forecast-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .fc-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 4px;
    border-right: 1px dashed var(--rule-soft);
  }
  .fc-day:last-child { border-right: none; }
  .fc-dow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .fc-icon {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .fc-temp {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  .fc-temp .min { color: var(--muted); font-style: italic; font-size: 12px; }
  .fc-rain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: .1em;
    color: var(--muted);
  }
  .fc-rain.wet { color: var(--accent); }
  .forecast-foot {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
  }
  .forecast-foot a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  .forecast-foot a:hover { color: var(--ink); border-bottom-color: var(--ink); }

  /* ————————————— SUB-MASTHEAD DATE STRIP ————————————— */
  .datestrip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .datestrip .center { color: var(--ink); }

  /* ————————————— SECTION LABEL ————————————— */
  .section-label {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 44px 0 22px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: .18em;
    color: var(--ink);
  }
  .section-label .num { color: var(--accent); }
  .section-label .rule {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .section-label .meta { color: var(--muted); }

  /* ————————————— DEPESCHEN ————————————— */
  .depeschen {
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr .95fr;
    gap: 0;
    position: relative;
  }
  .dep-col {
    padding: 22px 22px 18px;
    border-right: 1px solid var(--rule-soft);
    display: flex;
    flex-direction: column;
    min-height: 210px;
    cursor: pointer;
    position: relative;
    transition: background-color .25s ease;
  }
  .dep-col:last-child { border-right: none; }
  .dep-col:hover { background: var(--paper-2); }
  .dep-col:hover .dep-refresh { opacity: 1; }
  .dep-col.loading { cursor: default; }

  .dep-refresh {
    position: absolute;
    top: 20px;
    right: 18px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    transition: opacity .2s ease, transform .5s ease, color .2s ease;
    pointer-events: none;
  }
  .dep-col:hover .dep-refresh { color: var(--accent); }
  .dep-col.spinning .dep-refresh {
    opacity: 1;
    transform: rotate(360deg);
    color: var(--accent);
  }

  .dep-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0;
    background: var(--accent);
    opacity: .35;
    pointer-events: none;
  }
  .dep-col.paused .dep-progress { background: var(--muted); opacity: .2; }

  .dep-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .dep-eyebrow::before {
    content: "";
    width: 18px;
    height: 1px;
    background: var(--accent);
  }

  .dep-kicker {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 32px;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -.02em;
    margin-bottom: 8px;
  }

  .dep-body {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.4;
    color: var(--ink);
    flex: 1;
  }

  .dep-content {
    transition: opacity .3s ease, transform .3s ease;
  }
  .dep-col.fading .dep-content {
    opacity: 0;
    transform: translateY(4px);
  }

  .dep-quote .dep-body {
    font-style: italic;
    font-size: 16.5px;
    line-height: 1.35;
  }
  .dep-quote .dep-body::first-letter {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-style: normal;
    font-size: 50px;
    line-height: .8;
    float: left;
    padding: 6px 8px 0 0;
    color: var(--accent);
  }

  /* Ticker column — big single currency display */
  .dep-ticker .dep-body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 4px;
  }
  .tick-pair {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tick-name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1;
    margin-bottom: 6px;
  }
  .tick-val {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: -.02em;
    color: var(--ink);
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .tick-symbol {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0;
  }
  .tick-dots {
    display: flex;
    gap: 5px;
    margin-top: 10px;
  }
  .tick-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--rule-soft);
    transition: background-color .3s ease;
  }
  .tick-dot.active { background: var(--accent); }

  .dep-attr {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .dep-attr .src {
    color: var(--accent);
    font-family: 'Fraunces', serif;
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
    font-size: 12px;
  }

  .dep-col.loading .dep-kicker,
  .dep-col.loading .dep-body {
    color: transparent;
    background: linear-gradient(90deg, var(--rule-soft) 0%, transparent 50%, var(--rule-soft) 100%);
    background-size: 200% 100%;
    animation: dep-shimmer 1.4s infinite;
    border-radius: 2px;
  }
  .dep-col.loading .dep-kicker { min-height: 30px; margin-bottom: 12px; }
  .dep-col.loading .dep-body   { min-height: 60px; }
  @keyframes dep-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .section-label .reload,
  .section-label .pause {
    background: transparent;
    border: 1px solid var(--rule-soft);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 4px 9px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color .18s ease, border-color .18s ease;
  }
  .section-label .reload:hover,
  .section-label .pause:hover {
    color: var(--ink);
    border-color: var(--rule);
  }
  .section-label .reload .r-icon {
    display: inline-block;
    transition: transform .5s ease;
  }
  .section-label .reload.spin .r-icon { transform: rotate(360deg); }
  .section-label .pause.paused { color: var(--accent); border-color: var(--accent); }

  @media (max-width: 1060px) {
    .depeschen { grid-template-columns: 1fr 1fr; }
    .dep-col:nth-child(2) { border-right: none; }
    .dep-col:nth-child(1),
    .dep-col:nth-child(2) { border-bottom: 1px solid var(--rule-soft); }
  }
  @media (max-width: 640px) {
    .depeschen { grid-template-columns: 1fr; }
    .dep-col {
      border-right: none;
      border-bottom: 1px solid var(--rule-soft);
    }
    .dep-col:last-child { border-bottom: none; }
  }

  /* ————————————— GALLERY GRID ————————————— */
  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap: 0;
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
  }
  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    aspect-ratio: 1 / 1;
    min-height: 260px;
    padding: 22px 22px 20px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    color: inherit;
    background: var(--paper);
    transition: background-color .3s ease;
    overflow: hidden;
  }
  .tile::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    height: 2px;
    width: 0;
    background: var(--accent);
    transition: width .4s cubic-bezier(.7,0,.2,1);
  }
  .tile:hover::before { width: 100%; }
  .tile:hover { background: var(--paper-2); }

  .tile-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tile-head .no {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 28px;
    letter-spacing: -.03em;
    color: var(--accent);
    line-height: 1;
  }
  .tile-head .cat { color: var(--ink); }

  .tile-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(26px, 2.6vw, 34px);
    line-height: .95;
    letter-spacing: -.02em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .tile-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .tile-desc {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 0 0 22px;
  }

  .tile-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--rule-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tile-foot .go {
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tile-foot .arrow {
    font-family: 'Fraunces', serif;
    font-style: italic;
    text-transform: none;
    font-size: 18px;
    color: var(--accent);
    transition: transform .3s ease;
  }
  .tile:hover .arrow { transform: translateX(6px); }

  .tile.vacant {
    background: repeating-linear-gradient(
      135deg,
      transparent 0 12px,
      var(--rule-soft) 12px 13px
    );
    pointer-events: none;
    color: var(--muted);
  }
  .tile.vacant::before { display: none; }
  .tile.vacant .tile-title {
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
  }
  .tile.vacant .tile-head .no { color: var(--muted); }
  .tile.vacant .vacant-stamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--muted);
    padding: 4px 8px;
    display: inline-block;
    align-self: flex-start;
  }

  /* ————————————— FOOTER ————————————— */
  .foot {
    border-top: 2px solid var(--rule);
    margin-top: 56px;
    padding: 18px 0 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: .16em;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 12px;
  }
  .foot .colophon em {
    font-family: 'Fraunces', serif;
    font-style: italic;
    text-transform: none;
    color: var(--accent);
    letter-spacing: 0;
    font-size: 13px;
  }

  /* ————————————— SIDE ADS (>1560px) ————————————— */
  .ads-side {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    z-index: 40;
    display: none;
    pointer-events: none;
  }
  .ads-side.left  { left: 20px; }
  .ads-side.right { right: 20px; }
  @media (min-width: 1560px) {
    .ads-side { display: block; }
  }
  body.ads-off .ads-side { display: none !important; }

  .ad-slot { position: relative; pointer-events: auto; }
  .ad-link { display: block; color: inherit; text-decoration: none; }
  .ad-link .ad { transition: transform .25s ease, box-shadow .25s ease, opacity .38s ease, background-color .3s ease; }
  .ad-link:hover .ad { transform: translateY(-2px); box-shadow: 3px 3px 0 var(--rule); }
  .ad {
    position: relative;
    border: 1px solid var(--rule);
    background: var(--paper);
    padding: 14px 14px 12px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .35s ease, transform .35s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 200px;
    font-family: 'Inter', sans-serif;
  }
  .ad.show { opacity: 1; transform: translateY(0); }

  .ad-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ad-eyebrow::before {
    content: "ANZEIGE";
    color: var(--accent);
    font-weight: 600;
  }
  .ad-eyebrow .sep { color: var(--rule-soft); }
  .ad-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
